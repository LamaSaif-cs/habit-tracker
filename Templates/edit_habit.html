<!DOCTYPE html>
<html>

<head>

<title>Edit Habit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="auth-card">

<div class="logo">

<h1>Edit Habit</h1>

</div>

<form method="POST">

<input
type="text"
name="title"
value="{{ habit.title }}"
class="form-control mb-3"
required>

<textarea
name="description"
class="form-control mb-3"
rows="4">{{ habit.description }}</textarea>

<button class="btn btn-primary w-100">
Save Changes
</button>

</form>

<div class="text-center mt-3">

<a href="/dashboard">
Back to Dashboard
</a>

</div>

</div>

</body>
</html>
